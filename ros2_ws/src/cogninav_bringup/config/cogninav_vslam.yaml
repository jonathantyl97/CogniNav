/cogninav_vslam:
  ros__parameters:
    # CogniNav is stereo-only (no monocular mode).
    slam_mode: "stereo_inertial"
    vocabulary: ""
    settings: ""
    use_viewer: false
    frame_id: "map"
    left_camera_frame: "cam0"
    right_camera_frame: "cam1"
    left_image_topic: "/cam0/image_raw"
    right_image_topic: "/cam1/image_raw"
    imu_topic: "/imu0"
    publish_tf: true
