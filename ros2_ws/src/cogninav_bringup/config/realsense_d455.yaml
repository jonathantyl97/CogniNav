# Live rig: Intel RealSense D455 via realsense2_camera (ROS 2).
# Driver (separate terminal):
#   ros2 launch realsense2_camera rs_launch.py enable_infra1:=true enable_infra2:=true enable_gyro:=true enable_accel:=true unite_imu_method:=2

/cogninav_vslam:
  ros__parameters:
    slam_mode: "stereo_inertial"
    vocabulary: "/root/cogninav/third_party/ORB_SLAM3/Vocabulary/ORBvoc.txt"
    settings: "/root/cogninav/ros2_ws/src/cogninav_bringup/config/orb_realsense_d455.yaml"
    do_rectify: false
    do_equalize: false
    use_viewer: false
    frame_id: "map"
    camera_frame: "camera_infra1_optical_frame"
    left_image_topic: "/camera/camera/infra1/image_rect_raw"
    right_image_topic: "/camera/camera/infra2/image_rect_raw"
    imu_topic: "/camera/camera/imu"
    odom_topic: "/cogninav/odom"
    map_points_topic: "/cogninav/map_points"
    trajectory_path: "/tmp/cogninav_live_trajectory.txt"
    publish_tf: true
    map_publish_hz: 2.0
    max_map_points_publish: 50000

/cogninav_depth:
  ros__parameters:
    left_image_topic: "/camera/camera/infra1/image_rect_raw"
    right_image_topic: "/camera/camera/infra2/image_rect_raw"
    odom_topic: "/cogninav/odom"
    depth_points_topic: "/cogninav/stereo_points"
    map_frame: "map"
    fx: 385.0
    fy: 385.0
    cx: 320.0
    cy: 240.0
    baseline_m: 0.095
    max_points: 30000
    sync_slop_sec: 0.05

/cogninav_corridor_monitor:
  ros__parameters:
    image_topic: "/camera/camera/infra1/image_rect_raw"
    odom_topic: "/cogninav/odom"
    lane_markers_topic: "/cogninav/lane_markers"
    in_lane_markers_topic: "/cogninav/in_lane_markers"
    map_frame: "map"
    fx: 385.0
    fy: 385.0
    cx: 320.0
    cy: 240.0
    camera_height: 0.0
    ground_z: 0.0
    process_width: 640
    sample_points: 20
    history_frames: 40
    corridor_margin_px: 8.0
    detection_confidence: 0.45
    enable_object_detection: true
    mobilenet_prototxt: "/root/cogninav/models/MobileNetSSD_deploy.prototxt"
    mobilenet_weights: "/root/cogninav/models/MobileNetSSD_deploy.caffemodel"
