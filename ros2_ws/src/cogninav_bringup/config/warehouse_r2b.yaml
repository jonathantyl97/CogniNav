# NVIDIA r2b_storage — full CogniNav stack on native ROS 2 bag replay.
# Bag: see README.md (Datasets) — r2b_storage under ~/Downloads/warehouse/

/cogninav_vslam:
  ros__parameters:
    slam_mode: "stereo_inertial"
    vocabulary: "/root/cogninav/third_party/ORB_SLAM3/Vocabulary/ORBvoc.txt"
    settings: "/root/cogninav/ros2_ws/src/cogninav_bringup/config/orb_r2b_d455.yaml"
    do_rectify: false
    do_equalize: false
    frame_id: "map"
    camera_frame: "d455_1_left_ir_optical_frame"
    left_image_topic: "d455_1_left_ir_image"
    right_image_topic: "d455_1_right_ir_image"
    imu_topic: "d455_1_imu"
    odom_topic: "/cogninav/odom"
    trajectory_path: "/tmp/cogninav_r2b_trajectory.txt"
    publish_tf: true
    map_publish_hz: 5.0
    max_map_points_publish: 50000
    use_dynamic_mask: true
    dynamic_mask_topic: "/cogninav/dynamic_mask"

/cogninav_depth:
  ros__parameters:
    left_image_topic: "d455_1_left_ir_image"
    right_image_topic: "d455_1_right_ir_image"
    odom_topic: "/cogninav/odom"
    depth_points_topic: "/cogninav/stereo_points"
    map_frame: "map"
    fx: 770.0
    fy: 770.0
    cx: 640.0
    cy: 360.0
    baseline_m: 0.095
    max_points: 30000
    sync_slop_sec: 0.05

/cogninav_corridor_monitor:
  ros__parameters:
    image_topic: "d455_1_left_ir_image"
    odom_topic: "/cogninav/odom"
    lane_markers_topic: "/cogninav/lane_markers"
    in_lane_markers_topic: "/cogninav/in_lane_markers"
    map_frame: "map"
    fx: 770.0
    fy: 770.0
    cx: 640.0
    cy: 360.0
    camera_height: 0.5
    ground_z: 0.0
    process_width: 640
    sample_points: 20
    history_frames: 40
    corridor_margin_px: 12.0
    detection_confidence: 0.45
    enable_object_detection: true
    publish_dynamic_mask: true
    mobilenet_prototxt: "/root/cogninav/models/MobileNetSSD_deploy.prototxt"
    mobilenet_weights: "/root/cogninav/models/MobileNetSSD_deploy.caffemodel"
