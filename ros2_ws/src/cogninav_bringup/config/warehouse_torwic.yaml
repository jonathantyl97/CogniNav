# TorWIC warehouse (Clearpath) — full CogniNav stack on bag replay.
# Bag: ./scripts/download_warehouse.sh --source torwic --seq aisle_cw_run_1

/cogninav_vslam:
  ros__parameters:
    slam_mode: "stereo_inertial"
    vocabulary: "/root/cogninav/third_party/ORB_SLAM3/Vocabulary/ORBvoc.txt"
    settings: "/root/cogninav/ros2_ws/src/cogninav_bringup/config/orb_torwic_azure.yaml"
    do_rectify: false
    do_equalize: false
    frame_id: "map"
    camera_frame: "left_azure_rgb_camera_optical_frame"
    left_image_topic: "/cam0/image_raw"
    right_image_topic: "/cam1/image_raw"
    imu_topic: "/left_azure/imu"
    odom_topic: "/cogninav/odom"
    trajectory_path: "/tmp/cogninav_warehouse_trajectory.txt"
    publish_tf: true
    map_publish_hz: 5.0
    max_map_points_publish: 50000

/cogninav_depth:
  ros__parameters:
    left_image_topic: "/cam0/image_raw"
    right_image_topic: "/cam1/image_raw"
    odom_topic: "/cogninav/odom"
    depth_points_topic: "/cogninav/stereo_points"
    map_frame: "map"
    fx: 610.0
    fy: 610.0
    cx: 640.0
    cy: 360.0
    baseline_m: 0.075
    max_points: 30000
    sync_slop_sec: 0.08

/cogninav_corridor_monitor:
  ros__parameters:
    image_topic: "/cam0/image_raw"
    odom_topic: "/cogninav/odom"
    lane_markers_topic: "/cogninav/lane_markers"
    in_lane_markers_topic: "/cogninav/in_lane_markers"
    map_frame: "map"
    fx: 610.0
    fy: 610.0
    cx: 640.0
    cy: 360.0
    camera_height: 1.2
    ground_z: 0.0
    process_width: 640
    sample_points: 20
    history_frames: 40
    corridor_margin_px: 12.0
    detection_confidence: 0.45
    enable_object_detection: false
    mobilenet_prototxt: "/root/cogninav/models/MobileNetSSD_deploy.prototxt"
    mobilenet_weights: "/root/cogninav/models/MobileNetSSD_deploy.caffemodel"
