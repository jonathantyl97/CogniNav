# Lighter settings for interactive warehouse viz (reduces CPU/GPU load).

/cogninav_vslam:
  ros__parameters:
    settings: "/root/cogninav/ros2_ws/src/cogninav_bringup/config/orb_torwic_azure_fast.yaml"
    map_publish_hz: 2.0
    max_map_points_publish: 12000
    process_every_n: 2

/cogninav_viz:
  ros__parameters:
    max_points: 12000
    update_rate_hz: 10.0
    point_scale: 2.5
    stereo_point_scale: 1.5
    show_stereo_depth: false
    trajectory_max_waypoints: 800
    camera_max_width: 320
    camera_preview_hz: 5.0
    camera_decimate: 3
    camera_use_compressed: true
    camera_image_topic: "/left_azure/rgb/image_raw/compressed"
    camera_image_name: "camera/left_rgb"
    show_camera_preview: true

/cogninav_depth:
  ros__parameters:
    max_image_width: 640
    max_points: 8000
    process_every_n: 1

/cogninav_corridor_monitor:
  ros__parameters:
    process_width: 480
    history_frames: 20
